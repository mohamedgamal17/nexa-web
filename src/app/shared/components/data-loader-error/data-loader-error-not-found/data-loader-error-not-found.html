<div class="p-8 flex flex-col items-center justfiy-center gap-8">
  <div class="flex flex-col items-center gap-5">
    <div class="flex items-center p-5 rounded-full bg-secondary-subtle text-secondary text-4xl">
      <ng-icon name="featherSearch" />
    </div>
    <div class="text-center space-y-3">
      <h5>{{ 'errors.http.notFound.title' | translate }}</h5>
      <p class="text-secondary max-w-lg">{{ error()?.message }}</p>
    </div>
  </div>
  <div class="flex w-full flex-col gap-3">
    <p-button styleClass="flex-1 w-full" label="Back" severity="secondary" icon="pi pi-angle-left" (onClick)="back.emit()" />
  </div>
</div>
