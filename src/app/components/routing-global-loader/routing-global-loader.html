<div class="min-h-screen  flex flex-col">
   <p-progress-bar [value]="getCurrentProgress()" [showValue]="false" style="height: .5rem;" />

  <div class="flex-1 flex flex-col items-center justify-center">
    <div class="flex flex-col items-center flex-1 h-full justify-center gap-3">
      <div class="p-3 flex items-center rounded-full bg-primary-subtle">
        <p-progress-spinner style="width: 3.5rem; height: 3.5rem;" />
      </div>
      <!-- Centered phase indicator -->
      <div class="phase-indicator">
        <div class="spinner"></div>
        <p class="text-sm">{{ routerLoadingService.phaseMessage() }}</p>
      </div>
    </div>
  </div>
</div>
