<div class="min-h-screen flex flex-col">
  <div class="flex-1 flex flex-col items-center justify-center h-full gap-8 max-w-md mx-auto">
    <div
      class="bg-surface p-5 flex items-center shadow text-primary rounded rounded-2xl">
      <lucide-icon
        size="64"
        [name]="FileQuestionMark" />
    </div>
    <div class="flex flex-col gap-3">
      <h3 class="text-center">
        Lost in the
        <span class="text-primary">Digital Void?</span>
      </h3>
      <p class="text-secondary text-center">
        The page you're looking for doesn't exist or has been moved to a
        different secure vault.
      </p>
    </div>
    <div class=" flex gap-3 w-full">
    
      <div class="flex-1">
        <p-button
          styleClass="flex-1 !w-full"
          label="Go to dashboard"
          icon="pi pi-home"
          severity="primary" 
          (onClick)="navigateByUrl('')"
          />
      </div>
    </div>
  </div>
</div>
