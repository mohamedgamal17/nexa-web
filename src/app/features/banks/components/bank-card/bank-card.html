<p-card>
  <div class="grid grid-cols-1 gap-5">
    <div class="flex items-center gap-3">
      <div
        class="bg-primary-subtle text-primary rounded-2xl flex items-center p-4">
        <lucide-icon
          size="32"
          [name]="Building2" />
      </div>
      <h6>{{bank().bankName}}</h6>
    </div>
    <div
      class="bg-secondary-subtle border border-secondary-muted rounded rounded-2xl p-5">
      <p class="text-secondary text-sm font-bold">Account Number</p>
      <p class="font-bold">{{bank().accountNumberLast4 | bankAccountNumber}}</p>
    </div>
  </div>
</p-card>
