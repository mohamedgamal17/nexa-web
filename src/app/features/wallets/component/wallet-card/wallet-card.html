<p-card ngStyleClass="bg-primary text-primary-foreground">
  <div class="p-3">
    <div class="flex justify-between items-center">
      <div class="flex flex-col gap-5">
        <h5 class="text-primary-subtle/40 font-bold">Main Wallet Balance</h5>
        <h1 class="text-6xl mb-5">{{ 32500 | currency }}</h1>
        <div class="flex gap-3">
          <button class="px-8 py-4 flex items-center font-bold text-lg gap-3 bg-white/20 hover:bg-white/30 rounded-3xl border-none cursor-pointer">
            <ng-icon name="heroArrowUpRight" />
            Send
          </button>
          <button class="px-8 py-4 flex items-center font-bold text-lg gap-3 bg-white/20 hover:bg-white/30 rounded-3xl border-none cursor-pointer">
            <ng-icon name="heroArrowDownLeft" />
            Recive
          </button>
        </div>
      </div>
      <div class="text-white opacity-10">
        <lucide-icon [img]="Wallet" [size]="170" [strokeWidth]="2"></lucide-icon>
      </div>
    </div>
  </div>
</p-card>
