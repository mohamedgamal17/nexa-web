@if (loading()) {
  <div class="p-3 rounded-3xl bg-secondary-elevated animate-pulse">
    <div class="p-3">
      <div class="grid grid-cols-1 gap-8">
        <p-skeleton width="10rem" />
        <p-skeleton
          width="20rem"
          height="5rem" />
        <div class="flex gap-3">
          <p-skeleton
            width="10rem"
            height="3rem" />
          <p-skeleton
            width="10rem"
            height="3rem" />
        </div>
      </div>
    </div>
  </div>
} @else {
  <p-card ngStyleClass="bg-primary text-primary-foreground  relative">
    <div class="p-3 relative">
      <div class="flex flex-col">
        <div class="flex flex-col gap-5 relative">
          <h5 class="text-primary-subtle/40 font-bold">Main Wallet Balance</h5>
          <h1 class="text-6xl mb-5">{{ wallet()?.balance | currency }}</h1>
          <div class="flex flex-col lg:flex-row gap-3">
            <div class="grid grid-cols-2 gap-3">
              <button
                class="px-8 py-4 flex items-center font-bold text-lg gap-3 bg-white/20 hover:bg-white/30 rounded-3xl border-none cursor-pointer"
                (click)="showP2PModal()">
                <ng-icon name="heroArrowUpRight" />
                Send
              </button>
              <button
                class="px-8 py-4 flex items-center font-bold text-lg gap-3 bg-white/20 hover:bg-white/30 rounded-3xl border-none cursor-pointer" (click)="showReciveFundsModal()">
                <ng-icon name="heroArrowDownLeft" />
                Recive
              </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <button
                class="px-8 py-4 flex items-center font-bold text-lg gap-3 bg-white/20 hover:bg-white/30 rounded-3xl border-none cursor-pointer"
                (click)="showDepositModal()">
                <ng-icon name="heroPlus" />
                Deposit
              </button>
              <button
                class="px-8 py-4 flex items-center font-bold text-lg gap-3 bg-white/20 hover:bg-white/30 rounded-3xl border-none cursor-pointer"
                (click)="showWithdrawModal()">
                <ng-icon name="heroMinus" />
                Withdraw
              </button>
            </div>
          </div>
          <div class="absolute right-0 translate-y-10 text-white opacity-10">
            <lucide-icon
              [img]="WalletIcon"
              [size]="100"
              [strokeWidth]="2"></lucide-icon>
          </div>
        </div>
      </div>
    </div>
  </p-card>
}
