<div class="grid grid-cols-1 sm:grid-cols-12 gap-5">
  @if (hasError()) {
    <div class="col-span-12">
      <div class="flex items-center justify-center w-full">
        <div class="sm:w-[50%] w-full">
          <app-alert-error [error]="error() ?? undefined" />
        </div>
      </div>
    </div>
  } @else {
    <div class="sm:col-span-3">
      <div class="grid grid-cols-1 gap-5">
        <h6>My Wallets</h6>
        <app-wallet-list
          [loading]="isLoading()"
          [wallets]="wallets()"
          [activeWallet]="activeWallet() ?? undefined" />
      </div>
    </div>
    <app-wallet-card
      class="sm:col-span-9"
      [wallet]="activeWallet() ?? undefined"
      [loading]="isLoading()" />
    <app-transfer-modal
      []
      [wallets]="searchWallets()"
      (walletSearch)="searchWalletByNumber($event)"
      (submitied)="createNetworkTransfer($event)"></app-transfer-modal>
    <app-bank-transfer-modal
      [submiting]="submitingBankTransfer()"
      [banks]="banks()"
      [linking]="linkingBank()"
      (submitied)="createBankTransfer($event)"
      (linkBankAccount)="linkBankAccount()" />

    <p-toast />
  }
</div>
