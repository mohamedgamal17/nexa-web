<div class="grid grid-cols-1 sm:grid-cols-12 gap-5">
  @if (hasError()) {
    <div class="col-span-12">
      <div class="flex items-center justify-center w-full">
        <div class="sm:w-[50%] w-full">
          <app-alert-error [error]="error() ?? undefined" />
        </div>
      </div>
    </div>
  } @else {
    <div class="sm:col-span-3">
      <app-wallet-list [loading]="isLoading()" [wallets]="wallets()" [activeWallet]="activeWallet() ?? undefined" />
    </div>
    <app-wallet-card class="sm:col-span-9" [wallet]="activeWallet() ?? undefined" [loading]="isLoading()" />
    <app-transfer-modal></app-transfer-modal>
  }

  <div class="sm:col-span-12">
    <app-transfer-modal [wallets]="searchWallets()" (walletSearch)="searchWalletByNumber($event)" />
  </div>
</div>
