<div class="space-y-14">
  <div class="space-y-3">
    <h4>Let's get started</h4>
    <p>Tell us a bit about yourself to set up your account.</p>
  </div>
  <form (submit)="handleSubmit($event)" [formGroup]="emailForm">
    <div class="space-y-5">
      <div class="flex flex-col gap-2">
        <label for="email">Email</label>
        <input class="block" pInputText id="email" aria-describedby="email-help"
          [placeholder]="'forms.onboarding.email.placeholder' | translate" formControlName="email" />
        <app-app-form-errors [control]="emailForm.get('email')"
          [fieldKey]="'forms.onboarding.email.label'"></app-app-form-errors>
      </div>
      <button type="sumbit" size="large" class="w-full text-sm" [loading]="loading()" pButton>
        <span>Continue</span>
        @if (!loading()) {
        <i class="pi pi-angle-right"></i>
        }
      </button>

    </div>
  </form>
</div>
