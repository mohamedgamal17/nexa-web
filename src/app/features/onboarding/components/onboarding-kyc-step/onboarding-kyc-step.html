<div class="space-y-14">
  <div class="space-y-2">
    <div class="inline-flex font-bold text-primary items-center gap-2">
      <ng-icon class="text-2xl" name="heroShieldCheck" />
      <h6 class="text-primary uppercase">Identity Verification</h6>
    </div>

    <h4>Secure your account</h4>
    <p class="text-secondary">We use a secure third-party service to verify your identity. This helps us keep your assets safe and comply with financial regulations.</p>
  </div>

  <p-card>
    <div class="px-2.5 py-8">
      <div class="flex flex-col items-center justifiy-items-center gap-8">
        <div class="p-3 flex items-center rounded-full bg-primary-subtle text-primary">
          <ng-icon class="text-7xl" name="heroShieldCheck" />
        </div>
        <div class="space-y-3">
          <h5 class="text-center">Ready to verify?</h5>
          <p class="text-center text-secondary text-sm max-w-xs">You'll need a valid government ID and a few minutes of your time.</p>
        </div>

        <p-button label="Start Verification" [loading]="loading()" (onClick)="handleSubmit()" size="large" class="w-full" [fluid]="true" icon="pi pi-external-link" iconPos="right" />
      </div>
    </div>
  </p-card>
  <div class="flex flex-col gap-2">
    <p-button [fluid]="true" label="Skip for now" variant="text" severity="secondary" icon="pi pi-angle-right" iconPos="right" (onClick)="navigate()"></p-button>
  </div>
</div>
