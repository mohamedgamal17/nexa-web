<div class="space-y-14">
  <div class="space-y-3">
    <h4>Residential Address</h4>
    <p>Where should we send your physical card?</p>
  </div>
  <form
    (submit)="handleSubmit($event)"
    [formGroup]="addressForm">
    <div class="space-y-8">
      <div class="space-y-3">
        <div class="flex flex-grow-1 gap-3">
          <div class="flex-1 flex flex-col gap-2">
            <label for="country">
              {{ 'forms.onboarding.address.country.label' | translate }}
            </label>
            <p-select
              [options]="filteredCountries"
              optionLabel="name"
              optionValue="code"
              id="country"
              [placeholder]="
                'forms.onboarding.address.country.placeholder' | translate
              "
              formControlName="country"
              (onChange)="handleCountryChange($event.value)"
              [attr.data-testid]="tids.countrySelect" />
            <app-input-error
              [form]="addressForm"
              [control]="addressForm.get('country')"
              [field]="
                'forms.onboarding.address.country.label' | translate
              "></app-input-error>
          </div>
          <div class="flex-1 flex flex-col gap-2">
            <label for="state">
              {{ 'forms.onboarding.address.state.label' | translate }}
            </label>
            <p-select
              [options]="filteredStates()"
              [disabled]="selectedCountry() == null"
              optionLabel="name"
              optionValue="code"
              class="w-full"
              id="state"
              [placeholder]="
                'forms.onboarding.address.state.placeholder' | translate
              "
              formControlName="state"
              [attr.data-testid]="tids.stateSelect" />
            <app-input-error
              [form]="addressForm"
              [control]="addressForm.get('state')"
              [field]="
                'forms.onboarding.address.state.label' | translate
              "></app-input-error>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label for="city">
            {{ 'forms.onboarding.address.city.label' | translate }}
          </label>
          <input
            pInputText
            formControlName="city"
            [attr.data-testid]="tids.cityInput"
            [placeholder]="
              'forms.onboarding.address.city.placeholder' | translate
            " />
          <app-input-error
            [form]="addressForm"
            [control]="addressForm.get('city')"
            [field]="
              'forms.onboarding.address.city.label' | translate
            "></app-input-error>
        </div>
        <div class="flex flex-col gap-2">
          <label for="streetLine">
            {{ 'forms.onboarding.address.streetLine.label' | translate }}
          </label>
          <input
            pInputText
            formControlName="streetLine"
            [attr.data-testid]="tids.streetLineInput"
            [placeholder]="
              'forms.onboarding.address.streetLine.placeholder' | translate
            " />
          <app-input-error
            [form]="addressForm"
            [control]="addressForm.get('streetLine')"
            [field]="
              'forms.onboarding.address.streetLine.label' | translate
            "></app-input-error>
        </div>
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="flex flex-1 flex-col gap-2">
            <label for="postalCode">
              {{ 'forms.onboarding.address.postalCode.label' | translate }}
            </label>
            <input
              id="postalCode"
              pInputText
              class="w-full"
              [attr.data-testid]="tids.postalCodeInput"
              [placeholder]="
                'forms.onboarding.address.postalCode.placeholder' | translate
              "
              formControlName="postalCode" />
            <app-input-error
              [form]="addressForm"
              [control]="addressForm.get('postalCode')"
              [field]="
                'forms.onboarding.address.postalCode.label' | translate
              " />
          </div>
          <div class="flex flex-1 flex-col gap-2">
            <label for="zipCode">
              {{ 'forms.onboarding.address.zipCode.label' | translate }}
            </label>
            <input
              id="zipCode"
              pInputText
              class="w-full"
              [attr.data-testid]="tids.zipCodeInput"
              [placeholder]="
                'forms.onboarding.address.zipCode.placeholder' | translate
              "
              formControlName="zipCode" />
            <app-input-error
              [form]="addressForm"
              [control]="addressForm.get('zipCode')"
              [field]="'forms.onboarding.address.zipCode.label' | translate" />
          </div>
        </div>
      </div>

      <div class="flex gap-2">
        <p-button
          class="flex-1"
          styleClass="w-full  block"
          variant="outlined"
          severity="secondary"
          label="back"
          icon="pi pi-angle-left"
          iconPos="left"
          type="button"
          (onClick)="handleStepBack()"
          [attr.data-testid]="tids.stepbackButton"></p-button>
        <p-button
          class="flex-2"
          [loading]="loading()"
          styleClass="w-full block text-dark rounded-lg"
          label="Continue"
          icon="pi pi-angle-right"
          iconPos="right"
          type="submit"
          [attr.data-testid]="tids.submitButton"></p-button>
      </div>
    </div>
  </form>
</div>
