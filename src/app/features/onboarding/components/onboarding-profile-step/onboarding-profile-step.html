<div class="space-y-14">
  <div class="space-y-3">
    <h4>Let's get started</h4>
    <p>Tell us a bit about yourself to set up your account.</p>
  </div>
  <form (submit)="handleSubmit($event)" [formGroup]="profileFormGroup">
    <div class="space-y-8">

      <div class="space-y-3">
        <div class="flex flex-grow-1 gap-3">
          <div class="flex-1 flex flex-col gap-2">
            <label for="firstName">{{'forms.onboarding.profile.firstName.label' | translate}}</label>
            <input id="firstName" [placeholder]="'forms.onboarding.profile.firstName.placeholder' | translate"
              formControlName="firstName" pInputText />
            <app-app-form-errors [form]="profileFormGroup" [control]="profileFormGroup.get('firstName')"
              fieldKey='forms.onboarding.profile.firstName.label'></app-app-form-errors>
          </div>
          <div class="flex-1 flex flex-col gap-2">
            <label for="lastName">{{'forms.onboarding.profile.lastName.label' | translate}}</label>
            <input pInputText class="w-full" id="lastName"
              [placeholder]="'forms.onboarding.profile.lastName.placeholder' | translate" formControlName="lastName" />
            <app-app-form-errors [form]="profileFormGroup" [control]="profileFormGroup.get('lastName')"
              fieldKey='forms.onboarding.profile.lastName.label'></app-app-form-errors>
          </div>
        </div>
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="flex flex-1 flex-col gap-2">
            <label for="gender">{{'forms.onboarding.profile.gender.label' | translate}}</label>
            <p-select [options]="genderSelect" optionLabel="label" optionValue="value" class="w-full"
              formControlName="gender" />
            <app-app-form-errors [form]="profileFormGroup" [control]="profileFormGroup.get('gender')"
              fieldKey='forms.onboarding.profile.gender.label'></app-app-form-errors>
          </div>
          <div class=" flex-1 flex flex-col gap-2">
            <label for="birthDate">{{'forms.onboarding.profile.birthDate.label' | translate}}</label>
            <p-datepicker id="birthDate" dateFormat="dd/mm/yy" placeholder="dd/mm/yyyy" pInputMask="99/99/9999"
              formControlName="birthDate" />
            <app-app-form-errors [form]="profileFormGroup" [control]="profileFormGroup.get('birthDate')"
              fieldKey='forms.onboarding.profile.birthDate.label'></app-app-form-errors>
          </div>
        </div>
      </div>


      <button type="sumbit" size="large" class="w-full text-sm" [loading]="loading()" pButton>
        <span>Continue</span>
        @if (!loading()) {
        <i class="pi pi-angle-right"></i>
        }
      </button>

    </div>
  </form>
</div>
