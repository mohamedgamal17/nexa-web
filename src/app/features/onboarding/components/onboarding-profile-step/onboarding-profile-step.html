<div class="space-y-14">
  <div class="space-y-3">
    <h4>Let's get started</h4>
    <p>Tell us a bit about yourself to set up your account.</p>
  </div>
  <form (submit)="handleSubmit($event)" [formGroup]="profileFormGroup">
    <div class="space-y-8">
      <div class="space-y-3">
        <div class="flex flex-grow-1 gap-3">
          <div class="flex-1 flex flex-col gap-2">
            <label for="firstName">{{ 'forms.onboarding.profile.firstName.label' | translate }}</label>
            <input id="firstName" [placeholder]="'forms.onboarding.profile.firstName.placeholder' | translate" formControlName="firstName" pInputText />
            <app-input-error [form]="profileFormGroup" [control]="profileFormGroup.get('firstName')" [field]="'forms.onboarding.profile.firstName.label' | translate" />
          </div>
          <div class="flex-1 flex flex-col gap-2">
            <label for="lastName">{{ 'forms.onboarding.profile.lastName.label' | translate }}</label>
            <input pInputText class="w-full" id="lastName" [placeholder]="'forms.onboarding.profile.lastName.placeholder' | translate" formControlName="lastName" />
            <app-input-error [form]="profileFormGroup" [control]="profileFormGroup.get('lastName')" [field]="'forms.onboarding.profile.lastName.label' | translate" />
          </div>
        </div>
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="flex flex-1 flex-col gap-2">
            <label for="gender">{{ 'forms.onboarding.profile.gender.label' | translate }}</label>
            <p-select [options]="genderSelect" optionLabel="label" optionValue="value" class="w-full" formControlName="gender" />
            <app-input-error [form]="profileFormGroup" [control]="profileFormGroup.get('gender')" [field]="'forms.onboarding.profile.gender.label' | translate" />
          </div>
          <div class="flex-1 flex flex-col gap-2">
            <label for="birthDate">{{ 'forms.onboarding.profile.birthDate.label' | translate }}</label>
            <p-datepicker id="birthDate" dateFormat="dd/mm/yy" placeholder="dd/mm/yyyy" pInputMask="99/99/9999" formControlName="birthDate" />
            <app-input-error [form]="profileFormGroup" [control]="profileFormGroup.get('birthDate')" [field]="'forms.onboarding.profile.birthDate.label' | translate" />
          </div>
        </div>
      </div>

      <div class="flex gap-2">
        <p-button class="flex-1" styleClass="w-full  block" variant="outlined" severity="secondary" label="back" icon="pi pi-angle-left" iconPos="left" type="button" (onClick)="handleStepBack()"></p-button>
        <p-button class="flex-2" [loading]="loading()" styleClass="w-full block text-dark rounded-lg" label="Continue" icon="pi pi-angle-right" iconPos="right" type="submit"></p-button>
      </div>
    </div>
  </form>
</div>
