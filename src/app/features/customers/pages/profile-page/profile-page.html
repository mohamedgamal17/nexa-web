<div class="max-w-7xl mx-auto px-4 mt-8 lg:px-8 mb-8 min-h-screen flex flex-col">
  @if (isLoading()) {
    <div class="flex-1 flex items-center justify-center">
      <app-spinner [text]="'Preparing your data'" />
    </div>
  } @else {
    @if (hasApiError()) {
      <app-data-loader-error [error]="apiError()!" (refresh)="reloadPage()" />
    } @else {
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <div class="lg:col-span-4">
          <div class="flex flex-col gap-5">
            <app-profile-hero />
            <app-profile-contact [contact]="extractContact()" [phoneSubmiting]="isSubmitingPhone()" [emailSubmiting]="isSubmitingEmail()" (emailSubmited)="handleEmailSubmit($event)" (phoneSubmited)="handlePhoneSubmit($event)" />
          </div>
        </div>
        <div class="lg:col-span-8 grid grid-cols-1 gap-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <app-profile-info [info]="customer()!.info" [isSubmiting]="isSubmitingInfo()" (submited)="handleInfoSubmit($event)" />
            <app-profile-address [address]="customer()!.address" [isSubmiting]="isSubmitingAddress()" (submited)="handleAddressSubmit($event)" />
          </div>
          <div>
            <app-profile-document />
          </div>
        </div>
      </div>
      <p-toast />
    }
  }
</div>
